name: E2E

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**.md"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - uses: cachix/cachix-action@v17
        with:
          name: glint
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: nix develop --command cargo build --bin eth-glint --bin glint-analytics

      - name: E2E tests
        run: nix develop --command cargo nextest run -p glint-e2e --run-ignored all
