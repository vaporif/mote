name: E2E

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**.md"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-image:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: eth-glint
            dockerfile: docker/Dockerfile.node
            build-args: BINARY=eth-glint
          - image: op-glint
            dockerfile: docker/Dockerfile.node
            build-args: BINARY=op-glint
          - image: glint-sidecar
            dockerfile: docker/Dockerfile.sidecar
            build-args: ""
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build-args }}
          tags: ${{ matrix.image }}:latest
          outputs: type=docker,dest=/tmp/${{ matrix.image }}.tar
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Upload image
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.image }}-image
          path: /tmp/${{ matrix.image }}.tar
          retention-days: 1

  e2e:
    name: E2E
    needs: build-image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: Swatinem/rust-cache@v2

      - name: Download images
        uses: actions/download-artifact@v8
        with:
          pattern: "*-image"
          path: /tmp
          merge-multiple: true

      - name: Load Docker images
        run: |
          docker load -i /tmp/eth-glint.tar
          docker load -i /tmp/op-glint.tar
          docker load -i /tmp/glint-sidecar.tar

      - name: E2E tests
        run: nix develop --command cargo nextest run -p glint-e2e --run-ignored all
