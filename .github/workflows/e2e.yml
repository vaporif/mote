name: E2E

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**.md"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: Swatinem/rust-cache@v2
      - uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker buildx build --load --cache-from type=gha --cache-to type=gha,mode=max -f docker/Dockerfile.node -t eth-glint:latest .
          docker buildx build --load --cache-from type=gha --cache-to type=gha,mode=max -f docker/Dockerfile.sidecar -t glint-db-sidecar:latest .

      - name: E2E tests
        run: nix develop --command cargo nextest run -p glint-e2e --run-ignored all
