    directory: /
    schedule:
      interval: weekly
    groups:
      alloy:
        patterns: ["alloy-*"]
      reth:
        patterns: ["reth-*"]
      arrow:
        patterns: ["arrow-*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
