[graph]
targets = []
all-features = true

[advisories]
ignore = [
    { id = "RUSTSEC-2025-0141", reason = "bincode unmaintained — transitive dep from reth" },
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained — transitive dep from reth" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",
    "BlueOak-1.0.0",
    "0BSD",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/paradigmxyz/reth.git"]
